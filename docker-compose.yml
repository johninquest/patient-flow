services:
  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    container_name: popaty-api-dev
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=development
      - PORT=3000
      - DATABASE_URL=${DATABASE_URL}
      - AUTH_SECRET=${AUTH_SECRET}
      - API_URL=http://localhost:3000
      - CLIENT_URL=http://localhost:5173
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET}
    volumes:
      - ./api:/app
      - /app/node_modules
    networks:
      - popaty-dev

  client:
    build:
      context: ./client
      dockerfile: Dockerfile
    container_name: popaty-client-dev
    restart: unless-stopped
    ports:
      - "5173:5173"
    environment:
      - NODE_ENV=development
    volumes:
      - ./client:/app
      - /app/node_modules
    depends_on:
      - api
    networks:
      - popaty-dev

networks:
  popaty-dev:
    driver: bridge